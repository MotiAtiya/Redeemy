name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    name: Type Check & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Tests
        run: npx jest --ci --forceExit
