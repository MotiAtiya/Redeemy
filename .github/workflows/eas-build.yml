name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: development-simulator
        type: choice
        options:
          - development-simulator
          - development
          - preview
          - production
      platform:
        description: Platform
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  build:
    name: Build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Services files
        env:
          PLIST_B64: ${{ secrets.GOOGLE_SERVICES_PLIST_B64 }}
        run: |
          if [ -z "$PLIST_B64" ]; then
            echo "ERROR: GOOGLE_SERVICES_PLIST_B64 secret is missing"
            exit 1
          fi
          printf '%s' "$PLIST_B64" | base64 --decode > GoogleService-Info.plist
          echo "Written $(wc -c < GoogleService-Info.plist) bytes to GoogleService-Info.plist"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          eas build \
            --profile ${{ inputs.profile }} \
            --platform ${{ inputs.platform }} \
            --non-interactive
