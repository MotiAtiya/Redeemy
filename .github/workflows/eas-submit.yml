name: EAS Submit

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: Submit profile
        required: true
        default: production
        type: string

jobs:
  submit:
    name: Submit latest build to stores
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Submit build
        run: |
          eas submit \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --latest \
            --non-interactive
